<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agreement Wizard — Suvidha AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --danger: #dc2626;
            --g50: #f8fafc;
            --g100: #f1f5f9;
            --g200: #e2e8f0;
            --g300: #cbd5e1;
            --g400: #94a3b8;
            --g500: #64748b;
            --g700: #334155;
            --g800: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f0f2f7;
            color: var(--g800);
        }

        /* ─── Split Layout ─── */
        .wizard-wrap {
            padding-top: 76px;
            display: flex;
            height: calc(100vh - 0px);
        }

        .wizard-left {
            width: 55%;
            overflow-y: auto;
            padding: 2rem 2.5rem 3rem;
        }

        .wizard-right {
            width: 45%;
            background: white;
            border-left: 1px solid var(--g200);
            overflow-y: auto;
            position: sticky;
            top: 76px;
            height: calc(100vh - 76px);
        }

        .preview-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--g200);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--g50);
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .preview-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--g700);
        }

        .preview-badge {
            font-size: 0.65rem;
            background: #dcfce7;
            color: #16a34a;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .preview-body {
            padding: 0;
        }

        .preview-body iframe {
            width: 100%;
            height: calc(100vh - 130px);
            border: none;
        }

        .preview-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 130px);
            color: var(--g400);
            text-align: center;
            padding: 2rem;
        }

        .preview-empty svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .preview-empty p {
            font-size: 0.9rem;
            max-width: 300px;
        }

        /* ─── Stepper ─── */
        .stepper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding: 0.75rem 1rem;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--g200);
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--g400);
            cursor: pointer;
            transition: color 0.2s;
        }

        .step-item.active {
            color: var(--primary);
        }

        .step-item.done {
            color: var(--success);
        }

        .step-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            border: 2px solid var(--g300);
            background: white;
            transition: all 0.2s;
        }

        .step-item.active .step-num {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .step-item.done .step-num {
            border-color: var(--success);
            background: var(--success);
            color: white;
        }

        .step-line {
            flex: 1;
            height: 2px;
            background: var(--g200);
            min-width: 20px;
        }

        .step-line.done {
            background: var(--success);
        }

        /* ─── Step Content ─── */
        .step-content {
            display: none;
        }

        .step-content.visible {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .step-subtitle {
            color: var(--g500);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* ─── Category & Type Cards ─── */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .sel-card {
            background: white;
            border-radius: 14px;
            padding: 1.25rem;
            border: 2px solid var(--g200);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sel-card:hover {
            border-color: #c7d2fe;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.1);
        }

        .sel-card.selected {
            border-color: var(--primary);
            background: var(--primary-bg);
        }

        .sel-card .card-icon {
            font-size: 1.5rem;
        }

        .sel-card .card-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .sel-card .card-desc {
            font-size: 0.78rem;
            color: var(--g500);
            line-height: 1.4;
        }

        .sel-card .card-count {
            font-size: 0.7rem;
            color: var(--g400);
            font-weight: 600;
        }

        /* ─── Form ─── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .form-group.full {
            grid-column: 1/-1;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--g700);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .form-label .req {
            color: var(--danger);
        }

        .form-input,
        .form-textarea,
        .form-select {
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--g200);
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            color: var(--g800);
            background: var(--g50);
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
            background: white;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* ─── Clause Section ─── */
        .clause-section {
            margin-top: 2rem;
        }

        .clause-section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--g200);
        }

        .clause-section-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .clause-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        .clause-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .clause-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--g200);
            transition: border-color 0.2s;
        }

        .clause-row.unchecked {
            opacity: 0.5;
        }

        .clause-row:hover {
            border-color: #c7d2fe;
        }

        .clause-cb {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--g300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .clause-cb.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .clause-cb svg {
            display: none;
        }

        .clause-cb.checked svg {
            display: block;
        }

        .clause-info {
            flex: 1;
        }

        .clause-info .cl-title {
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 0.25rem;
        }

        .clause-info .cl-preview {
            font-size: 0.78rem;
            color: var(--g500);
            line-height: 1.4;
            max-height: 40px;
            overflow: hidden;
        }

        /* ─── Buttons ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: white;
            color: var(--g700);
            border: 1px solid var(--g200);
        }

        .btn-outline:hover {
            border-color: var(--g300);
            background: var(--g50);
        }

        .btn-success {
            background: #059669;
            color: white;
        }

        .btn-success:hover {
            background: #047857;
        }

        .btn-ai {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
        }

        .btn-ai:hover {
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
        }

        .btn-sm {
            padding: 0.4rem 0.85rem;
            font-size: 0.78rem;
            border-radius: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-row .spacer {
            flex: 1;
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #059669;
        }

        .toast.error {
            background: #dc2626;
        }

        /* ─── Loading ─── */
        .loading-center {
            text-align: center;
            padding: 3rem;
            color: var(--g400);
        }

        .spin {
            width: 32px;
            height: 32px;
            border: 3px solid var(--g200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: sp 0.8s linear infinite;
            margin: 0 auto 0.75rem;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:900px) {
            .wizard-wrap {
                flex-direction: column;
            }

            .wizard-left,
            .wizard-right {
                width: 100%;
            }

            .wizard-right {
                position: relative;
                top: 0;
                height: auto;
                min-height: 400px;
            }
        }
    </style>
</head>

<body>
    <div id="app-topbar" data-active="certificates"></div>

    <div class="wizard-wrap">
        <!-- LEFT PANEL — Wizard Steps -->
        <div class="wizard-left">
            <div class="stepper" id="stepper"></div>
            <div id="step-1" class="step-content visible"></div>
            <div id="step-2" class="step-content"></div>
            <div id="step-3" class="step-content"></div>
            <div id="step-4" class="step-content"></div>
        </div>

        <!-- RIGHT PANEL — Live Preview -->
        <div class="wizard-right">
            <div class="preview-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                <h3>Live Preview</h3>
                <span class="preview-badge" id="preview-badge" style="display:none">● LIVE</span>
            </div>
            <div class="preview-body" id="preview-body">
                <div class="preview-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <p>Select an agreement type and fill in the details to see a live preview here</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="fy-utils.js"></script>
    <script src="api_config.js"></script>
    <script src="session-manager.js?v=2"></script>
    <script>
        if (!requireAuth()) { }

        // ═══ STATE ═══
        let remoteTemplates = [];
        let selectedTemplate = null;
        let currentStep = 1;
        let fieldValues = {};

        let previewDebounce = null;
        let templateContentHtml = null; // cached built html
        let isPDF = false;
        let pdfURL = null;

        const STEPS = [
            { num: 1, label: 'Select Template' },
            { num: 2, label: 'Fill Details' },
            { num: 3, label: 'Preview & Generate' },
        ];

        // ═══ STEPPER ═══
        function renderStepper() {
            document.getElementById('stepper').innerHTML = STEPS.map((s, i) => {
                const cls = s.num < currentStep ? 'done' : s.num === currentStep ? 'active' : '';
                const lineCls = s.num < currentStep ? 'done' : '';
                return `
                <div class="step-item ${cls}" onclick="${s.num < currentStep ? `goToStep(${s.num})` : ''}">
                    <div class="step-num">${s.num < currentStep ? '✓' : s.num}</div>
                    <span>${s.label}</span>
                </div>
                ${i < STEPS.length - 1 ? `<div class="step-line ${lineCls}"></div>` : ''}
            `;
            }).join('');
        }

        function goToStep(n) {
            currentStep = n;
            renderStepper();
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('visible'));
            document.getElementById(`step-${n}`).classList.add('visible');
            if (n >= 3) updatePreview();
        }

        // ═══ STEP 1 — TEMPLATES ═══
        async function loadCategories() {
            const el = document.getElementById('step-1');
            el.innerHTML = '<div class="loading-center"><div class="spin"></div><p>Loading templates...</p></div>';

            try {
                const resp = await authFetch('/tools/certificate-templates/remote');
                if (!resp || !resp.ok) throw new Error('Failed to load templates');
                remoteTemplates = await resp.json();

                el.innerHTML = `
                <h2 class="step-title">Select Template</h2>
                <p class="step-subtitle">Choose a CA Certificate template to begin.</p>
                <div class="card-grid">
                    ${remoteTemplates.map((t, i) => {
                    const isPdf = t.extension === '.pdf';
                    return `
                        <div class="sel-card" data-name="${t.name}" onclick="selectTemplate('${t.name}')">
                            <div class="card-icon">${isPdf ? '📄' : '📝'}</div>
                            <div class="card-name">${t.name.replace(/_/g, ' ')}</div>
                            <div class="card-desc">Supabase Remote Template</div>
                        </div>
                    `}).join('')}
                </div>
            `;
            } catch (err) {
                el.innerHTML = `<div style="color:var(--danger);padding:2rem;">⚠️ ${err.message}</div>`;
            }
        }

        function selectTemplate(name) {
            selectedTemplate = remoteTemplates.find(t => t.name === name);
            // Highlight
            document.querySelectorAll('#step-1 .sel-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`#step-1 .sel-card[data-name="${name}"]`).classList.add('selected');

            // Set up fields based on standard GST CA Cert schema
            fieldValues = {
                client_name: 'The Client',
                period: FYPeriod.getCurrentFY() ? 'FY ' + FYPeriod.getCurrentFY() : 'FY 2026-27',
                export_turnover: '0',
                eligible_itc: '0',
                refund_amount: '0',
                ca_name: 'Rahul Gupta',
                ca_membership: 'Partner | M.No 123456'
            };

            templateContentHtml = null;
            isPDF = selectedTemplate.extension === '.pdf';
            pdfURL = null;

            // Auto-advance after brief delay
            setTimeout(() => {
                renderStep2();
                goToStep(2);
            }, 300);
        }

        // ═══ STEP 2 — FILL DETAILS ═══
        function renderStep2() {
            if (!selectedTemplate) return;
            const el = document.getElementById('step-2');

            const fields = [
                { name: 'client_name', label: 'Client Name', type: 'text', placeholder: 'e.g. Rahul Enterprises', required: true },
                { name: 'period', label: 'Period', type: 'select', options: FYPeriod.getFYOptions(3, true).map(o => o.label).concat(['H1 (Apr-Sep)', 'H2 (Oct-Mar)']), required: true },
                { name: 'export_turnover', label: 'Export Turnover (₹)', type: 'number', required: true },
                { name: 'eligible_itc', label: 'Eligible ITC (₹)', type: 'number', required: true },
                { name: 'refund_amount', label: 'Refund Amount (₹)', type: 'number', required: true },
                { name: 'ca_name', label: 'CA Name', type: 'text', placeholder: 'e.g. Rahul Gupta', required: true },
                { name: 'ca_membership', label: 'CA Membership No.', type: 'text', placeholder: 'e.g. Partner | M.No 123456', required: true }
            ];

            el.innerHTML = `
            <h2 class="step-title">${isPDF ? '📄' : '📝'} ${selectedTemplate.name.replace(/_/g, ' ')}</h2>
            <p class="step-subtitle">Fill in the core certificate details.</p>

            <div class="form-grid">
                ${fields.map(f => `
                    <div class="form-group ${f.name === 'client_name' ? 'full' : ''}">
                        <label class="form-label">${f.label}${f.required ? '<span class="req">*</span>' : ''}</label>
                        ${f.type === 'select'
                    ? `<select class="form-select" data-field="${f.name}" onchange="onFieldChange('${f.name}', this.value)">
                                ${(f.options || []).map(o => `<option ${fieldValues[f.name] === o ? 'selected' : ''}>${o}</option>`).join('')}
                           </select>`
                    : `<input class="form-input" type="${f.type}" data-field="${f.name}"
                                placeholder="${f.placeholder || ''}" value="${fieldValues[f.name] || ''}"
                                oninput="onFieldChange('${f.name}', this.value)">`
                }
                    </div>
                `).join('')}
            </div>
            
            <div style="background:var(--g50);padding:1rem;border-radius:10px;border:1px solid var(--g200);margin-bottom:1.5rem;">
                <p style="font-size:0.85rem;color:var(--g600);margin:0;">
                    ${isPDF ? '⚠️ <b>Note:</b> This template is a PDF. You will fill in details, but live text editing is not supported.' : '✨ <b>Live Editing:</b> This is a DOCX template. You can freely edit the text in the preview on the right.'}
                </p>
            </div>

            <div class="btn-row">
                <button class="btn btn-outline" onclick="goToStep(1)">← Back</button>
                <div class="spacer"></div>
                <button class="btn btn-primary" onclick="generateAndGoToStep3()">Generate & Review →</button>
            </div>
        `;
        }

        async function generateAndGoToStep3() {
            const btn = document.querySelector('#step-2 .btn-primary');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spin" style="width:14px;height:14px;border-width:2px;margin:0"></span> Generating...';
            }

            try {
                const filename = selectedTemplate.name;
                const urlRes = await authFetch(`/tools/certificate-templates/remote/url?filename=${encodeURIComponent(filename)}`);
                if (!urlRes.ok) throw new Error("Failed to get remote template URL");

                const { url } = await urlRes.json();

                if (isPDF) {
                    pdfURL = url;
                } else {
                    // It's a DOCX, parse with mammoth
                    const docxRes = await fetch(url);
                    const arrayBuffer = await docxRes.arrayBuffer();
                    const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
                    rawContent = result.value;
                }

                renderStep3();
                goToStep(3);
            } catch (err) {
                console.error(err);
                showToast("Error generating certificate preview. Please check console.", "error");
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = 'Generate & Review →';
                }
            }
        }

        // ═══ STEP 3 — GENERATE & PREVIEW ═══
        function renderStep3() {
            const el = document.getElementById('step-3');
            el.innerHTML = `
            <h2 class="step-title">Preview & Generate</h2>
            <p class="step-subtitle">Review your certificate on the right. ${!isPDF ? 'You can directly edit the text in the preview.' : ''}</p>

            <div style="background:white;border-radius:14px;padding:1.5rem;border:1px solid var(--g200);margin-bottom:1.5rem;">
                <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
                    <span style="font-size:1.5rem;">${isPDF ? '📄' : '📝'}</span>
                    <div>
                        <div style="font-weight:700;font-size:1.1rem;">${selectedTemplate.name.replace(/_/g, ' ')}</div>
                        <div style="font-size:0.8rem;color:var(--g400);">CA Certificate</div>
                    </div>
                </div>
                <div style="font-size:0.82rem;color:var(--g500);line-height:1.5;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
                    ${Object.entries(fieldValues).filter(([k, v]) => v).map(([k, v]) => `
                        <div><strong>${k.replace(/_/g, ' ')}:</strong> ${v}</div>
                    `).join('')}
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-outline" onclick="goToStep(2)">← Back to Edit</button>
                <div class="spacer"></div>
                ${!isPDF ? `
                <button class="btn btn-outline" id="btn-edit-preview" onclick="togglePreviewEdit()">
                    ✏️ Edit Document
                </button>
                ` : ''}
                <button class="btn btn-primary" onclick="downloadPDF()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download PDF
                </button>
            </div>
        `;
            schedulePreview();
        }

        // ═══ EDIT PREVIEW (STEP 4) ═══
        function togglePreviewEdit() {
            const pb = document.getElementById('preview-body');
            const iframe = pb.querySelector('iframe');
            if (!iframe) {
                showToast('⚠️ No preview to edit', 'error');
                return;
            }

            const btn = document.getElementById('btn-edit-preview');
            const doc = iframe.contentDocument;
            const isEditing = doc.body.getAttribute('contenteditable') === 'true';

            if (isEditing) {
                // Disable editing
                doc.body.setAttribute('contenteditable', 'false');
                doc.body.style.backgroundColor = '';
                btn.innerHTML = '✏️ Edit Document';
                btn.classList.remove('btn-success');
                btn.classList.add('btn-outline');

                // For template previews, when finished editing, update the html cache so it gets saved on docx generation
                if (templatePreviewHtml) {
                    templatePreviewHtml = doc.documentElement.outerHTML;
                    // Note: downloading docx from server will STILL use the original template with form fields, 
                    // NOT the raw HTML edits. Word extraction of raw HTML is complex. 
                    // But downloading PDF will capture all edits!
                }

                showToast('Editing disabled. Download PDF to capture exact visual edits.', '');
            } else {
                // Enable editing
                doc.body.setAttribute('contenteditable', 'true');
                doc.body.focus();
                doc.body.style.backgroundColor = '#fefefe';
                doc.body.style.borderRadius = '4px';
                doc.body.style.boxShadow = 'inset 0 0 0 2px var(--primary)';

                btn.innerHTML = '💾 Finish Editing';
                btn.classList.remove('btn-outline');
                btn.classList.add('btn-success');
                showToast('✅ You can now edit the entire document directly! Click anywhere in the preview.', 'success');
            }
        }
        // ═══ DOWNLOAD PDF — Direct PDF download using html2pdf.js ═══
        function downloadPDF() {
            const pb = document.getElementById('preview-body');
            if (!pb) { showToast('No preview available to download.', 'error'); return; }

            const iframe = pb.querySelector('iframe');
            if (!iframe) { showToast('No preview available to download.', 'error'); return; }

            const btn = document.querySelector('#step-3 .btn-primary') || document.querySelector('[onclick="downloadPDF()"]');
            const originalText = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spin" style="width:14px;height:14px;border-width:2px;margin:0;display:inline-block"></span> Generating PDF...';
            }

            const loadLib = () => {
                if (window.html2pdf) return Promise.resolve();
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js';
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('Failed to load PDF library'));
                    document.head.appendChild(script);
                });
            };

            loadLib().then(() => {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const clone = iframeDoc.body.cloneNode(true);

                clone.querySelectorAll('.tpl-ph').forEach(span => {
                    span.style.border = 'none';
                    span.style.background = 'none';
                    span.style.padding = '0';
                    span.style.color = 'inherit';
                    span.style.fontWeight = 'inherit';
                    span.removeAttribute('contenteditable');
                });

                const container = document.createElement('div');
                container.style.cssText = 'font-family: "Times New Roman", serif; line-height: 1.6; padding: 0;';

                const iframeStyles = iframeDoc.querySelectorAll('style');
                iframeStyles.forEach(s => {
                    container.appendChild(s.cloneNode(true));
                });
                container.appendChild(clone);

                const filename = selectedTemplate
                    ? selectedTemplate.name.replace(/_/g, ' ') + '.pdf'
                    : 'Certificate.pdf';

                html2pdf().set({
                    margin: [10, 10, 10, 10],
                    filename: filename,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                }).from(container).save().then(() => {
                    showToast('✅ PDF downloaded successfully!', 'success');
                }).catch(err => {
                    console.error('PDF generation error:', err);
                    showToast('Error generating PDF. Try again.', 'error');
                }).finally(() => {
                    if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
                });
            }).catch(err => {
                console.error(err);
                showToast('Failed to load PDF library. Check your internet connection.', 'error');
                if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
            });
        }

        // ═══ PREVIEW ═══
        function schedulePreview() {
            clearTimeout(previewDebounce);
            previewDebounce = setTimeout(updatePreview, 150); // faster since client-side
        }

        async function fetchTemplatePreview(typeId) {
            try {
                const resp = await authFetch(`/agreements/types/${typeId}/preview-template`);
                if (!resp || !resp.ok) throw new Error('Failed');
                const data = await resp.json();
                if (data.has_template && data.html) {
                    templatePreviewHtml = data.html;
                    updatePreview(); // initial render
                }
            } catch (err) {
                console.warn('Template preview fetch failed, using clause preview:', err);
                templatePreviewHtml = null;
            }
        }

        function updatePreview() {
            if (!selectedType) return;
            const badge = document.getElementById('preview-badge');

            // If we have a docx-based template, do client-side replacement
            if (templatePreviewHtml) {
                updateTemplatePreview();
                if (badge) badge.style.display = 'inline';
                return;
            }

            // Fallback: clause-based preview via backend
            updateClausePreview();
        }

        function updateTemplatePreview() {
            let html = templatePreviewHtml;

            // Append extra clauses HTML if any are enabled
            const enabledExtra = extraClauses.filter(c => c._enabled);
            if (enabledExtra.length > 0) {
                let extraHtml = '<h2 style="font-size:14px;font-weight:700;color:#1e3a8a;margin:24px 0 8px;text-transform:uppercase;letter-spacing:0.5px;">Additional Clauses (Miscellaneous)</h2>';
                enabledExtra.forEach((c, i) => {
                    extraHtml += `<p style="margin:8px 0;text-align:justify;color:#334155;"><b>${i + 1}. ${c.title}:</b> ${c.content}</p>`;
                });
                // Insert before </body>
                html = html.replace('</body>', extraHtml + '</body>');
            }

            // Use DOM to replace placeholder spans with field values
            const pb = document.getElementById('preview-body');
            let iframe = pb.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = 'calc(100vh - 130px)';
                iframe.style.border = 'none';
                pb.innerHTML = '';
                pb.appendChild(iframe);
            }

            iframe.contentDocument.open();
            iframe.contentDocument.write(html);
            iframe.contentDocument.close();

            // Now replace placeholders and make them editable
            const placeholders = iframe.contentDocument.querySelectorAll('.tpl-ph[data-field]');
            placeholders.forEach(span => {
                const field = span.getAttribute('data-field');
                const value = fieldValues[field];

                // Make editable
                span.setAttribute('contenteditable', 'true');
                span.setAttribute('spellcheck', 'false');
                span.style.cursor = 'text';
                span.style.outline = 'none';
                span.style.minWidth = '60px';

                if (value && value.toString().trim()) {
                    span.textContent = value;
                    span.classList.add('filled');
                } else {
                    span.textContent = field.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    span.classList.remove('filled');
                }

                // On focus, select all text for easy editing
                span.addEventListener('focus', function () {
                    if (!this.classList.contains('filled')) {
                        this.textContent = '';
                    }
                    this.style.background = '#fef3c7';
                    this.style.borderColor = '#f59e0b';
                    this.style.color = '#92400e';
                });

                // On blur, sync back to fieldValues and update form
                span.addEventListener('blur', function () {
                    const newVal = this.textContent.trim();
                    if (newVal) {
                        fieldValues[field] = newVal;
                        this.classList.add('filled');
                        this.style.background = '#f0fdf4';
                        this.style.borderColor = '#86efac';
                        this.style.color = '#166534';
                    } else {
                        delete fieldValues[field];
                        this.textContent = field.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                        this.classList.remove('filled');
                        this.style.background = '#eff6ff';
                        this.style.borderColor = '#93c5fd';
                        this.style.color = '#1e40af';
                    }
                    // Sync to form input on left panel
                    const formInput = document.querySelector(`[data-field="${field}"]`);
                    if (formInput) {
                        formInput.value = newVal;
                    }
                });

                // Prevent Enter from creating new lines
                span.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.blur();
                    }
                });
            });
        }

        async function updateClausePreview() {
            if (clauses.length === 0) return;
            const badge = document.getElementById('preview-badge');
            try {
                const resp = await authFetch('/agreements/generate-preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agreement_type_id: selectedType.id,
                        field_values: fieldValues,
                        selected_clauses: clauses.filter(c => c._enabled).map(c => ({
                            id: c.id, title: c.title, content: c.content,
                            is_default: true, order: c.order,
                        })),
                    }),
                });
                if (!resp || !resp.ok) throw new Error('Preview failed');
                const data = await resp.json();

                const pb = document.getElementById('preview-body');
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = 'calc(100vh - 130px)';
                iframe.style.border = 'none';
                pb.innerHTML = '';
                pb.appendChild(iframe);
                iframe.contentDocument.open();
                iframe.contentDocument.write(data.html);
                iframe.contentDocument.close();

                if (badge) { badge.style.display = 'inline'; }
            } catch (err) {
                console.error('Preview error:', err);
            }
        }

        // ═══ PREVIEW ═══
        function schedulePreview() {
            clearTimeout(previewDebounce);
            previewDebounce = setTimeout(updatePreview, 150);
        }

        async function updatePreview() {
            const pb = document.getElementById('preview-body');
            const badge = document.getElementById('preview-badge');
            if (!pb) return;

            if (!selectedTemplate) {
                pb.innerHTML = `
                    <div class="preview-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        </svg>
                        <p>Select a certificate template to see a live preview here</p>
                    </div>`;
                if (badge) badge.style.display = 'none';
                return;
            }

            if (isPDF) {
                if (pdfURL) {
                    pb.innerHTML = `<iframe src="${pdfURL}" style="width:100%;height:calc(100vh - 130px);border:none;border-radius:12px;"></iframe>`;
                    if (badge) badge.style.display = 'inline';
                }
                return;
            }

            // For DOCX, we build the HTML and inject editable spans
            let processedHtml = rawContent;

            // Map our field values to the standard {tags} used in CA certificates
            const t = {
                name: fieldValues.client_name || 'The Client',
                period: fieldValues.period || '...',
                exportTurnover: parseFloat(fieldValues.export_turnover || 0).toLocaleString('en-IN'),
                eligibleITC: parseFloat(fieldValues.eligible_itc || 0).toLocaleString('en-IN'),
                refund: parseFloat(fieldValues.refund_amount || 0).toLocaleString('en-IN'),
                caName: fieldValues.ca_name || 'Rahul Gupta',
                caMno: fieldValues.ca_membership || 'Partner | M.No ...',
                certTitle: selectedTemplate.name.replace(/_/g, ' ').toUpperCase(),
                date: new Date().toLocaleDateString()
            };

            const regexMap = {
                'name': /{name}|{{name}}/g,
                'period': /{period}|{{period}}/g,
                'exportTurnover': /{exportTurnover}|{{exportTurnover}}/g,
                'eligibleITC': /{eligibleITC}|{{eligibleITC}}/g,
                'refund': /{refund}|{{refund}}/g,
                'caName': /{caName}|{{caName}}/g,
                'caMno': /{caMno}|{{caMno}}/g,
                'certTitle': /{certTitle}|{{certTitle}}/g,
                'date': /{date}|{{date}}/g
            };

            // Inject styles for the spans
            const styles = `
                <style>
                body { font-family: 'Times New Roman', serif; line-height: 1.6; padding: 40px; }
                .tpl-ph {
                    display: inline;
                    background: #eff6ff;
                    color: #1e40af;
                    border: 1px dashed #93c5fd;
                    border-radius: 4px;
                    padding: 1px 6px;
                    font-weight: 600;
                    font-size: 15px;
                    transition: all 0.2s;
                    cursor: text;
                    outline: none;
                }
                .tpl-ph.filled {
                    background: #f0fdf4;
                    color: #166534;
                    border-color: #86efac;
                }
                .tpl-ph:focus {
                    background: #fef3c7;
                    border-color: #f59e0b;
                    color: #92400e;
                }
                table { border-collapse: collapse; width: 100%; margin: 15px 0; }
                td, th { border: 1px solid #000; padding: 6px; }
                </style>
            `;

            // Replace tags with editable spans
            for (const [key, regex] of Object.entries(regexMap)) {
                let val = t[key];
                let isFilled = val && val !== '0' && val !== 'The Client' && val !== 'Rahul Gupta' && val !== '...';
                let cls = isFilled ? 'tpl-ph filled' : 'tpl-ph';

                // For CA certs, we don't have a 1:1 map with the form fields directly for every tag in mammoth
                // So we just use contenteditable without data-field syncing for now, or we can map them directly.
                let span = `<span class="${cls}" data-key="${key}" contenteditable="true" spellcheck="false">${val}</span>`;
                processedHtml = processedHtml.replace(regex, span);
            }

            templateContentHtml = styles + processedHtml;

            let iframe = pb.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = 'calc(100vh - 130px)';
                iframe.style.border = 'none';
                iframe.style.borderRadius = '12px';
                iframe.style.backgroundColor = 'white';
                pb.innerHTML = '';
                pb.appendChild(iframe);
            }

            iframe.contentDocument.open();
            iframe.contentDocument.write(templateContentHtml);
            iframe.contentDocument.close();

            // Add script to iframe to prevent enter keys inside spans
            const script = iframe.contentDocument.createElement('script');
            script.textContent = `
                document.querySelectorAll('.tpl-ph').forEach(span => {
                    span.addEventListener('keydown', function(e) {
                        if(e.key === 'Enter') { e.preventDefault(); this.blur(); }
                    });
                });
            `;
            iframe.contentDocument.body.appendChild(script);

            if (badge) badge.style.display = 'inline';
        }

        // ═══ DRAFT / EXPORT ═══
        function saveDraft() {
            showToast('Draft feature for CA certificates coming soon.', '');
        }

        // ═══ HELPERS ═══
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast show ${type}`;
            setTimeout(() => t.className = 'toast', 3000);
        }

        function escapeHTML(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Override goToStep to also render step 4
        const _origGoToStep = goToStep;
        goToStep = function (n) {
            if (n === 4) renderStep4();
            _origGoToStep(n);
        };

        // ═══ INIT ═══
        renderStepper();
        loadCategories();

        // Check URL params for direct type access
        const urlParams = new URLSearchParams(window.location.search);
        const directTemplate = urlParams.get('template');
        if (directTemplate) {
            // Load templates then auto-select
            (async () => {
                await loadCategories();
                if (remoteTemplates.find(t => t.name === directTemplate)) {
                    selectTemplate(directTemplate);
                }
            })();
        }
    </script>
    <script src="app-topbar.js"></script>
    <script src="app-footer.js"></script>
