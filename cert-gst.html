<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Certificate Wizard — ComplianceAI Expert</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --danger: #dc2626;
            --g50: #f8fafc;
            --g100: #f1f5f9;
            --g200: #e2e8f0;
            --g300: #cbd5e1;
            --g400: #94a3b8;
            --g500: #64748b;
            --g700: #334155;
            --g800: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f0f2f7;
            color: var(--g800);
        }

        /* ─── Split Layout ─── */
        .wizard-wrap {
            padding-top: 76px;
            display: flex;
            height: calc(100vh - 0px);
        }

        .wizard-left {
            width: 55%;
            overflow-y: auto;
            padding: 2rem 2.5rem 3rem;
        }

        .wizard-right {
            width: 45%;
            background: white;
            border-left: 1px solid var(--g200);
            overflow-y: auto;
            position: sticky;
            top: 76px;
            height: calc(100vh - 76px);
        }

        .preview-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--g200);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--g50);
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .preview-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--g700);
        }

        .preview-badge {
            font-size: 0.65rem;
            background: #dcfce7;
            color: #16a34a;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .preview-body {
            padding: 0;
        }

        .preview-body iframe {
            width: 100%;
            height: calc(100vh - 130px);
            border: none;
        }

        .preview-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 130px);
            color: var(--g400);
            text-align: center;
            padding: 2rem;
        }

        .preview-empty svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .preview-empty p {
            font-size: 0.9rem;
            max-width: 300px;
        }

        /* ─── Stepper ─── */
        .stepper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding: 0.75rem 1rem;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--g200);
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--g400);
            cursor: pointer;
            transition: color 0.2s;
        }

        .step-item.active {
            color: var(--primary);
        }

        .step-item.done {
            color: var(--success);
        }

        .step-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            border: 2px solid var(--g300);
            background: white;
            transition: all 0.2s;
        }

        .step-item.active .step-num {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .step-item.done .step-num {
            border-color: var(--success);
            background: var(--success);
            color: white;
        }

        .step-line {
            flex: 1;
            height: 2px;
            background: var(--g200);
            min-width: 20px;
        }

        .step-line.done {
            background: var(--success);
        }

        /* ─── Step Content ─── */
        .step-content {
            display: none;
        }

        .step-content.visible {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .step-subtitle {
            color: var(--g500);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* ─── Category & Type Cards ─── */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .sel-card {
            background: white;
            border-radius: 14px;
            padding: 1.25rem;
            border: 2px solid var(--g200);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sel-card:hover {
            border-color: #c7d2fe;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.1);
        }

        .sel-card.selected {
            border-color: var(--primary);
            background: var(--primary-bg);
        }

        .sel-card .card-icon {
            font-size: 1.5rem;
        }

        .sel-card .card-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .sel-card .card-desc {
            font-size: 0.78rem;
            color: var(--g500);
            line-height: 1.4;
        }

        .sel-card .card-count {
            font-size: 0.7rem;
            color: var(--g400);
            font-weight: 600;
        }

        /* ─── Form ─── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .form-group.full {
            grid-column: 1/-1;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--g700);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .form-label .req {
            color: var(--danger);
        }

        .form-input,
        .form-textarea,
        .form-select {
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--g200);
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            color: var(--g800);
            background: var(--g50);
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
            background: white;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* ─── Clause Section ─── */
        .clause-section {
            margin-top: 2rem;
        }

        .clause-section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--g200);
        }

        .clause-section-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .clause-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        .clause-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .clause-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--g200);
            transition: border-color 0.2s;
        }

        .clause-row.unchecked {
            opacity: 0.5;
        }

        .clause-row:hover {
            border-color: #c7d2fe;
        }

        .clause-cb {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--g300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .clause-cb.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .clause-cb svg {
            display: none;
        }

        .clause-cb.checked svg {
            display: block;
        }

        .clause-info {
            flex: 1;
        }

        .clause-info .cl-title {
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 0.25rem;
        }

        .clause-info .cl-preview {
            font-size: 0.78rem;
            color: var(--g500);
            line-height: 1.4;
            max-height: 40px;
            overflow: hidden;
        }

        /* ─── Buttons ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: white;
            color: var(--g700);
            border: 1px solid var(--g200);
        }

        .btn-outline:hover {
            border-color: var(--g300);
            background: var(--g50);
        }

        .btn-success {
            background: #059669;
            color: white;
        }

        .btn-success:hover {
            background: #047857;
        }

        .btn-ai {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
        }

        .btn-ai:hover {
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
        }

        .btn-sm {
            padding: 0.4rem 0.85rem;
            font-size: 0.78rem;
            border-radius: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-row .spacer {
            flex: 1;
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #059669;
        }

        .toast.error {
            background: #dc2626;
        }

        /* ─── Loading ─── */
        .loading-center {
            text-align: center;
            padding: 3rem;
            color: var(--g400);
        }

        .spin {
            width: 32px;
            height: 32px;
            border: 3px solid var(--g200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: sp 0.8s linear infinite;
            margin: 0 auto 0.75rem;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:900px) {
            .wizard-wrap {
                flex-direction: column;
            }

            .wizard-left,
            .wizard-right {
                width: 100%;
            }

            .wizard-right {
                position: relative;
                top: 0;
                height: auto;
                min-height: 400px;
            }
        }
    </style>
</head>

<body>
    <div id="app-topbar" data-active="certificates"></div>

    <div class="wizard-wrap">
        <!-- LEFT PANEL — Wizard Steps -->
        <div class="wizard-left">
            <div class="stepper" id="stepper"></div>
            <div id="step-1" class="step-content visible"></div>
            <div id="step-2" class="step-content"></div>
            <div id="step-3" class="step-content"></div>
            <div id="step-4" class="step-content"></div>
        </div>

        <!-- RIGHT PANEL — Live Preview -->
        <div class="wizard-right">
            <div class="preview-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                <h3>Live Preview</h3>
                <span class="preview-badge" id="preview-badge" style="display:none">● LIVE</span>
            </div>
            <div class="preview-body" id="preview-body">
                <div class="preview-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <p>Select an agreement type and fill in the details to see a live preview here</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="api_config.js"></script>
    <script src="session-manager.js?v=2"></script>
    <script>
        if (!requireAuth()) { }
        
        const CERT_CATEGORY = "gst";

        function getInitialFieldValues(templateName) {
            return {
                certificate_no: '',
                cert_date: '',
                gst_office_address: '',
                ca_firm_name: '',
                membership_no: '',
                frn: '',
                ca_office_address: '',
                applicant_name: '',
                gstin: '',
                pan: '',
                applicant_address: '',
                refund_category: '',
                arn: '',
                tax_period: '',
                refund_amount: '',
                tax_amount_paid: '',
                tax_amount_words: '',
                refund_reason: '',
                udin: '',
                ca_signatory_name: '',
                sign_date: '',
                sign_place: ''
            };
        }

        function getFieldSections() {
            return [
                {
                    title: '📋 Certificate Details',
                    fields: [
                        { name: 'certificate_no', label: 'Certificate No.', type: 'text', placeholder: 'e.g. GST/REF/2024/001' },
                        { name: 'cert_date', label: 'Date', type: 'text', placeholder: 'DD/MM/YYYY' },
                        { name: 'gst_office_address', label: 'Address of GST Office', type: 'text', placeholder: 'e.g. Ward 5, CGST Division, Mumbai' },
                    ]
                },
                {
                    title: '🏢 CA / Firm Details',
                    fields: [
                        { name: 'ca_firm_name', label: 'Name of CA / CA Firm', type: 'text', placeholder: 'e.g. Gupta & Associates', required: true },
                        { name: 'membership_no', label: 'Membership No.', type: 'text', placeholder: 'e.g. 123456', required: true },
                        { name: 'frn', label: 'Firm Registration No. (FRN)', type: 'text', placeholder: 'e.g. 123456N' },
                        { name: 'ca_office_address', label: 'CA Office Address', type: 'text', placeholder: 'Full office address' },
                    ]
                },
                {
                    title: '👤 Applicant Details',
                    fields: [
                        { name: 'applicant_name', label: 'Name of Applicant', type: 'text', placeholder: 'e.g. Acme Tech Pvt Ltd', required: true },
                        { name: 'gstin', label: 'GSTIN / UIN', type: 'text', placeholder: 'e.g. 27AABCU9603R1ZM', required: true },
                        { name: 'pan', label: 'PAN', type: 'text', placeholder: 'e.g. ABCDE1234F' },
                        { name: 'applicant_address', label: 'Address', type: 'text', placeholder: 'Registered address of applicant' },
                        { name: 'refund_category', label: 'Category of Refund Claim', type: 'select', options: ['', 'Export of goods/services (with payment of tax)', 'Export under LUT/Bond', 'Inverted duty structure', 'Excess cash in Electronic Cash Ledger', 'Deemed exports', 'Other'] },
                        { name: 'arn', label: 'Application Reference No. (ARN)', type: 'text', placeholder: 'e.g. AA270724000123H' },
                        { name: 'tax_period', label: 'Tax Period (From – To)', type: 'text', placeholder: 'e.g. April 2023 to March 2024' },
                        { name: 'refund_amount', label: 'Amount of Refund Claimed (₹)', type: 'number', placeholder: 'e.g. 500000', required: true },
                    ]
                },
                {
                    title: '📝 Certification Details',
                    fields: [
                        { name: 'tax_amount_paid', label: 'Tax Amount Paid (₹)', type: 'number', placeholder: 'e.g. 1500000' },
                        { name: 'tax_amount_words', label: 'Tax Amount (in words)', type: 'text', placeholder: 'e.g. Fifteen Lakhs only' },
                        { name: 'refund_reason', label: 'Refund Reason (if Other)', type: 'text', placeholder: 'Specify if Other is selected above' },
                    ]
                },
                {
                    title: '✍️ Signatory Details',
                    fields: [
                        { name: 'ca_signatory_name', label: 'CA Signatory Name', type: 'text', placeholder: 'Name of signing CA' },
                        { name: 'sign_date', label: 'Signature Date', type: 'text', placeholder: 'DD/MM/YYYY' },
                        { name: 'sign_place', label: 'Place', type: 'text', placeholder: 'e.g. Mumbai' },
                        { name: 'udin', label: 'UDIN', type: 'text', placeholder: 'e.g. 24123456ABCDEF1234' },
                    ]
                }
            ];
        }


        function getReplacements(mkSpan) {
            return [
                // Table 0: Certificate No / Date
                { find: /Certificate No\.: _+/g, replace: () => `Certificate No.: ${mkSpan('certificate_no', 'Certificate No.')}` },
                { find: /Date: _+/g, replace: () => `Date: ${mkSpan('cert_date', 'Date')}`, first: true },
                // GST Office Address
                { find: /\[Address of GST Office\]/g, replace: () => mkSpan('gst_office_address', 'Address of GST Office') },
                // CA Firm intro paragraph
                { find: /I\/We, _+ \(Name of CA \/ CA Firm\)/g, replace: () => `I/We, ${mkSpan('ca_firm_name', 'Name of CA / CA Firm')}` },
                { find: /Membership No\. _+/g, replace: () => `Membership No. ${mkSpan('membership_no', 'Membership No.')}`, first: true },
                { find: /Firm Registration No\. _+/g, replace: () => `Firm Registration No. ${mkSpan('frn', 'FRN')}` },
                { find: /having our office at _+,/g, replace: () => `having our office at ${mkSpan('ca_office_address', 'CA Office Address')},` },
                // Table 1: Applicant Details — replace the ___ in the value cells
                { find: /(Name of Applicant<\/td><td>:<\/td><td>)_+/g, replace: () => `$1${mkSpan('applicant_name', 'Applicant Name')}` },
                { find: /(GSTIN \/ UIN<\/td><td>:<\/td><td>)_+/g, replace: () => `$1${mkSpan('gstin', 'GSTIN')}` },
                { find: /(PAN<\/td><td>:<\/td><td>)_+/g, replace: () => `$1${mkSpan('pan', 'PAN')}` },
                { find: /(Address<\/td><td>:<\/td><td>)_+/g, replace: () => `$1${mkSpan('applicant_address', 'Address')}` },
                { find: /(Category of Refund Claim<\/td><td>:<\/td><td>)_+/g, replace: () => `$1${mkSpan('refund_category', 'Refund Category')}` },
                { find: /(Application Reference No\. \(ARN\)<\/td><td>:<\/td><td>)_+/g, replace: () => `$1${mkSpan('arn', 'ARN')}` },
                { find: /(Tax Period \(From .* To\)<\/td><td>:<\/td><td>)_+/g, replace: () => `$1${mkSpan('tax_period', 'Tax Period')}` },
                { find: /(Amount of Refund Claimed<\/td><td>:<\/td><td>)Rs\. _+/g, replace: () => `$1Rs. ${mkSpan('refund_amount', 'Amount')}` },
                // Point 1: Tax amount paid
                { find: /of Rs\. <span class="tpl-ph" data-field="flat_no">Flat No<\/span>/g, replace: () => `of Rs. ${mkSpan('tax_amount_paid', 'Tax Amount')}` },
                { find: /\(Rupees <span class="tpl-ph" data-field="floor">Floor<\/span> only\)/g, replace: () => `(Rupees ${mkSpan('tax_amount_words', 'Amount in Words')} only)` },
                // Point 5: Other specify
                { find: /Other \(specify\): <span class="tpl-ph" data-field="survey_no">Survey No<\/span>/g, replace: () => `Other (specify): ${mkSpan('refund_reason', 'Reason')}` },
                // Signature table
                { find: /For \[Name of CA \/ CA Firm\]/g, replace: () => `For ${mkSpan('ca_firm_name', 'CA Firm Name')}` },
                { find: /Name: _+/g, replace: () => `Name: ${mkSpan('ca_signatory_name', 'CA Name')}` },
                { find: /Membership No\.: _+/g, replace: () => `Membership No.: ${mkSpan('membership_no', 'Membership No.')}` },
                { find: /Firm Reg\. No\. \(if applicable\): _+/g, replace: () => `Firm Reg. No. (if applicable): ${mkSpan('frn', 'FRN')}` },
                { find: /Date: _+/g, replace: () => `Date: ${mkSpan('sign_date', 'Date')}` },
                { find: /Place: _+/g, replace: () => `Place: ${mkSpan('sign_place', 'Place')}` },
                // UDIN note
                { find: /UDIN \(if applicable\): _+/g, replace: () => `UDIN (if applicable): ${mkSpan('udin', 'UDIN')}` },
            ];
        }

    </script>
    <script src="cert-engine.js"></script>
    <script src="app-topbar.js"></script>

</body>
</html>
